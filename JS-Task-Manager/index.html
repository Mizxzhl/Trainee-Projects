<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List App</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="todo-app">
        <h1>TO-Do App</h1>
        <form class="input-area">
          <input type="text" id="task-input" placeholder="Add a New task" />
          <button type="button" id="add-task-btn">
            <i class="fa-solid fa-plus"></i>
          </button>
        </form>

        <div id="filters">
          <button id="showAll">All</button>
          <button id="showCompleted">Completed</button>
          <button id="showPending">Pending</button>
        </div>

        <button id="clearCompleted">Clear Completed</button>

        <div class="todos-container">
          <ul id="task-list"></ul>

          <!-- <img class="empty-image" src="empty.webp" alt=""> -->
        </div>
      </div>
    </div>

    <div id="taskCounter">
      Total:
      <span id="totalTasks">0</span>
      | Completed:
      <span id="completedTasks">0</span>
      | Pending:
      <span id="pendingTasks">0</span>
    </div>

    <script src="script.js"></script>
  </body>
</html>
